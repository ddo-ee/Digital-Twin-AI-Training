<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #0a0f17;
            --panel: rgba(18, 24, 34, 0.88);
            --panel-border: rgba(126, 231, 135, 0.22);
            --accent: #7ee787;
            --accent-strong: #56d364;
            --text: #f3f6fb;
            --muted: #9fb0c4;
            --danger: #ff7b72;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top, rgba(126, 231, 135, 0.14), transparent 36%),
                linear-gradient(135deg, #071018, #0d1622 45%, #101b28);
        }

        .login-card {
            width: min(100%, 420px);
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(18px);
        }

        .eyebrow {
            margin: 0 0 8px;
            color: var(--accent);
            font-size: 0.82rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 1.9rem;
        }

        .intro {
            margin: 0 0 24px;
            color: var(--muted);
            line-height: 1.5;
        }

        .error {
            margin: 0 0 16px;
            padding: 12px 14px;
            border-radius: 12px;
            background: rgba(255, 123, 114, 0.12);
            border: 1px solid rgba(255, 123, 114, 0.28);
            color: var(--danger);
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--muted);
            font-size: 0.92rem;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 16px;
            border: 1px solid rgba(159, 176, 196, 0.18);
            border-radius: 12px;
            background: rgba(6, 10, 16, 0.72);
            color: var(--text);
            font: inherit;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(126, 231, 135, 0.15);
        }

        button {
            width: 100%;
            border: none;
            border-radius: 12px;
            padding: 13px 16px;
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            color: #06240e;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }

        .hint {
            margin: 16px 0 0;
            color: var(--muted);
            font-size: 0.88rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <main class="login-card">
        <p class="eyebrow">Restricted Access</p>
        <h1>Digital Twin Command Center</h1>
        <p class="intro">Sign in before using the dashboard, camera feeds, and API endpoints on this network.</p>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form method="POST" action="{{ url_for('login', next=next_url) }}">
            <input type="hidden" name="next" value="{{ next_url or '' }}">

            <label for="username">Username</label>
            <input id="username" name="username" type="text" value="{{ username }}" autocomplete="username" required>

            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>

            <button type="submit">Sign In</button>
        </form>

    </main>
</body>
</html>
