<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web App Login</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #08111a;
            --panel: rgba(16, 24, 34, 0.9);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f5f7fb;
            --muted: #9fb0c4;
            --accent: #03dac6;
            --danger: #ff7b72;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top, rgba(3, 218, 198, 0.15), transparent 35%),
                linear-gradient(135deg, #071018, #0d1622 45%, #101b28);
        }

        .login-card {
            width: min(100%, 420px);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(18px);
        }

        .eyebrow {
            margin: 0 0 8px;
            color: var(--accent);
            font-size: 0.82rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 1.9rem;
        }

        .intro {
            margin: 0 0 24px;
            color: var(--muted);
            line-height: 1.5;
        }

        .error {
            margin: 0 0 16px;
            padding: 12px 14px;
            border-radius: 12px;
            background: rgba(255, 123, 114, 0.12);
            border: 1px solid rgba(255, 123, 114, 0.28);
            color: var(--danger);
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--muted);
            font-size: 0.92rem;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 16px;
            border: 1px solid rgba(159, 176, 196, 0.18);
            border-radius: 12px;
            background: rgba(6, 10, 16, 0.72);
            color: var(--text);
            font: inherit;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(3, 218, 198, 0.15);
        }

        button {
            width: 100%;
            border: none;
            border-radius: 12px;
            padding: 13px 16px;
            background: linear-gradient(135deg, #03dac6, #00bfa5);
            color: #031d1c;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }

        .hint {
            margin: 16px 0 0;
            color: var(--muted);
            font-size: 0.88rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <main class="login-card">
        <p class="eyebrow">Restricted Access</p>
        <h1>Digital Twin Command Center</h1>
        <p class="intro">Sign in to open the web app dashboard.</p>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form method="POST" action="{{ url_for('login', next=next_url) }}">
            <input type="hidden" name="next" value="{{ next_url or '' }}">

            <label for="username">Username</label>
            <input id="username" name="username" type="text" value="{{ username }}" autocomplete="username" required>

            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>

            <button type="submit">Sign In</button>
        </form>

        <p class="hint">Set <code>DT_WEBAPP_PASSWORD</code> and optionally <code>DT_WEBAPP_USERNAME</code> for a permanent login.</p>
    </main>
</body>
</html>
